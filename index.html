<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBot: Missão Sustentável 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        canvas { display: block; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; max-width: 80%; margin-bottom: 20px; }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 780px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            z-index: 5;
        }

        .stat { background: rgba(0, 243, 255, 0.2); padding: 10px; border-left: 4px solid var(--neon-blue); }

        #quiz-screen { display: none; }
        .quiz-option {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            padding: 15px;
            margin: 10px;
            width: 80%;
            cursor: pointer;
            transition: 0.2s;
        }
        .quiz-option:hover { background: var(--neon-blue); color: black; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <div class="stat">PONTOS: <span id="score-val">0</span></div>
        <div class="stat">MODO: <span id="mode-name" style="color: #ff8c00;">E-WASTE</span></div>
        <div class="stat">FASE: <span id="level-val">1</span></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>ECOBOT 2026</h1>
        <p>Ajude o EcoBot a separar resíduos eletrônicos tóxicos do lixo comum!</p>
        <p style="font-size: 0.9rem; color: var(--neon-blue);">SETAS para mover | ESPAÇO para trocar o recipiente</p>
        <button onclick="startGame()">Iniciar Missão</button>
    </div>

    <div id="quiz-screen" class="overlay hidden">
        <h2 id="quiz-question" style="color: var(--neon-blue);">Pergunta</h2>
        <div id="quiz-options"></div>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title">MISSÃO CUMPRIDA!</h1>
        <p id="end-msg">Você ajudou a salvar o planeta.</p>
        <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSeS-xH2h_Pq6V-N1S7T3-M8E5_V_G_T_V_G_T_V_G/viewform')">Responder Pesquisa</button>
        <button onclick="location.reload()" style="margin-top: 10px; font-size: 1rem;">Reiniciar</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0;
    let gameActive = false;
    let currentLevel = 1;
    let items = [];
    let frame = 0;

    const images = {};
    const imageFiles = {
        botFront: '7.png', botRight: '8.png', botLeft: '9.png',
        rec_glass: '4.png',
        rec_plastic: '5.png',
        rec_metal: '2.png',
        rec_organic: '1.png',
        rec_ewaste: '6.png',
        ewaste1: 'placa-de-video.png', ewaste2: 'teclado.png',
        org1: 'pizza.png', org2: 'sorvete.png', org3: 'salada.png', org4: 'ceia-de-natal.png',
        metal1: 'lata-de-cerveja.png', metal2: 'clima.png', 
        glass1: 'garrafa.png', plastic1: 'água.png'
    };

    const WASTE_TYPES = {
        EWASTE: { id: 0, imgKey: 'rec_ewaste', name: 'E-WASTE', color: '#ff8c00' },
        ORGANIC: { id: 1, imgKey: 'rec_organic', name: 'ORGÂNICO', color: '#8b4513' },
        METAL: { id: 2, imgKey: 'rec_metal', name: 'METAIS', color: '#ffd700' },
        GLASS: { id: 3, imgKey: 'rec_glass', name: 'VIDRO', color: '#32cd32' },
        PLASTIC: { id: 4, imgKey: 'rec_plastic', name: 'PLÁSTICO', color: '#ff4500' }
    };

    let currentModeIndex = 0;
    const modes = Object.values(WASTE_TYPES);

    for (let key in imageFiles) {
        images[key] = new Image();
        images[key].src = imageFiles[key];
    }

    const player = {
        x: 350, y: 480, w: 100, h: 100, speed: 10,
        sprite: 'botFront', moveLeft: false, moveRight: false
    };

    class Trash {
        constructor() {
            this.x = Math.random() * (canvas.width - 50);
            this.y = -50;
            this.w = 50; this.h = 50;
            this.speed = 3 + Math.random() * 3 + currentLevel;
            const typeKeys = Object.keys(WASTE_TYPES);
            this.type = WASTE_TYPES[typeKeys[Math.floor(Math.random() * typeKeys.length)]];
            
            if (this.type === WASTE_TYPES.EWASTE) this.img = images['ewaste' + (Math.random() > 0.5 ? '1' : '2')];
            else if (this.type === WASTE_TYPES.ORGANIC) this.img = images['org' + (Math.floor(Math.random() * 4) + 1)];
            else if (this.type === WASTE_TYPES.METAL) this.img = images['metal' + (Math.random() > 0.5 ? '1' : '2')];
            else if (this.type === WASTE_TYPES.GLASS) this.img = images['glass1'];
            else this.img = images['plastic1'];
        }
        update() { this.y += this.speed; }
        draw() { if (this.img) ctx.drawImage(this.img, this.x, this.y, this.w, this.h); }
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') { player.moveLeft = true; player.sprite = 'botLeft'; }
        if (e.key === 'ArrowRight') { player.moveRight = true; player.sprite = 'botRight'; }
        if (e.key === ' ' && gameActive) switchMode();
    });

    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft') player.moveLeft = false;
        if (e.key === 'ArrowRight') player.moveRight = false;
        if (!player.moveLeft && !player.moveRight) player.sprite = 'botFront';
    });

    function switchMode() {
        currentModeIndex = (currentModeIndex + 1) % modes.length;
        const mode = modes[currentModeIndex];
        document.getElementById('mode-name').innerText = mode.name;
        document.getElementById('mode-name').style.color = mode.color;
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        gameActive = true;
        update();
    }

    function update() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (player.moveLeft && player.x > 0) player.x -= player.speed;
        if (player.moveRight && player.x < canvas.width - player.w) player.x += player.speed;
        ctx.drawImage(images[player.sprite], player.x, player.y, player.w, player.h);
        const currentRecImg = images[modes[currentModeIndex].imgKey];
        if (currentRecImg) ctx.drawImage(currentRecImg, player.x + 25, player.y - 40, 50, 50);

        frame++;
        if (frame % 60 === 0) items.push(new Trash());

        items.forEach((item, index) => {
            item.update();
            item.draw();
            if (item.y + item.h > player.y && item.x + item.w > player.x && item.x < player.x + player.w) {
                if (item.type.id === modes[currentModeIndex].id) {
                    score += 10;
                    if (score % 100 === 0) startQuiz();
                } else {
                    score -= 5;
                }
                items.splice(index, 1);
                document.getElementById('score-val').innerText = score;
            }
            if (item.y > canvas.height) items.splice(index, 1);
        });

        if (score >= 500) endGame(true);
        requestAnimationFrame(update);
    }

    const questions = [
        { q: "Qual metal pesado é comum em pilhas e baterias?", a: ["Chumbo", "Alumínio", "Ferro"], correct: 0 },
        { q: "Onde descartar um teclado velho?", a: ["Lixo comum", "Ponto de coleta eletrónico", "Enterrar"], correct: 1 }
    ];

    function startQuiz() {
        gameActive = false;
        const q = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('quiz-question').innerText = q.q;
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerText = opt;
            btn.onclick = () => {
                if (i === q.correct) score += 50;
                document.getElementById('quiz-screen').classList.add('hidden');
                gameActive = true;
                update();
            };
            optionsDiv.appendChild(btn);
        });
        document.getElementById('quiz-screen').classList.remove('hidden');
    }

    function endGame(victory) {
        gameActive = false;
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoBot v3.4 - Precision Catch</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-blue: #00f3ff; --neon-red: #ff3131; --bg: #050505; }
        * { touch-action: manipulation; box-sizing: border-box; -webkit-user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        #console-terminal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 25px; 
            background: #111; border-bottom: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-size: 10px; font-family: monospace;
            padding: 5px 10px; z-index: 1000;
        }

        #main-shell { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        #game-canvas-area { flex-grow: 1; position: relative; background: radial-gradient(circle, #101020 0%, #000 100%); }
        canvas { display: block; width: 100%; height: 100%; }

        #control-panel { 
            display: flex; justify-content: space-around; background: #0a0a0a; 
            padding: 10px 0; border-top: 2px solid #222; min-height: 100px;
        }

        .bin-unit { display: flex; flex-direction: column; align-items: center; transition: 0.3s; flex: 1; cursor: pointer; border-radius: 10px; }
        .bin-unit img { width: 48px; height: 48px; object-fit: contain; }
        .bin-unit span { font-size: 9px; font-family: 'Orbitron'; margin-top: 6px; color: #fff; font-weight: bold; text-shadow: 0 0 5px #000; }

        .bin-unit.active { background: rgba(57, 255, 20, 0.1); box-shadow: inset 0 0 15px rgba(57, 255, 20, 0.2); transform: scale(1.05); }
        .bin-unit.active img { filter: drop-shadow(0 0 12px var(--neon-green)); }
        .bin-unit.active span { color: var(--neon-green); }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; text-align: center; }
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 600; pointer-events: none; }
        .blink-text { color: var(--neon-green); font-family: 'Orbitron'; font-size: 1.2rem; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        #hud-display { position: absolute; top: 35px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; font-family: 'Orbitron'; font-size: 11px; pointer-events: none; z-index: 100; }
        .hidden { display: none !important; }
        
        #loading-bar-wrap { width: 220px; height: 4px; background: #222; margin: 15px 0; border-radius: 2px; }
        #loading-bar-fill { width: 0%; height: 100%; background: var(--neon-green); transition: width 0.3s; }
        .btn-action { padding: 12px 30px; background: none; border: 2px solid var(--neon-green); color: var(--neon-green); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="console-terminal">SYSTEM >> Calibragem de Colisão Central v3.4...</div>

<div id="main-shell">
    <div id="game-canvas-area">
        <div id="hud-display" class="hidden">
            <div style="color: var(--neon-green);">DATA: <span id="score-val">0</span></div>
            <div id="mode-id" style="color: var(--neon-blue);">MODO: ELETRÔNICO</div>
            <div style="color: var(--neon-red);">LOST: <span id="err-val">0</span></div>
        </div>

        <div id="boot-screen" class="ui-layer">
            <h1 style="color: var(--neon-green); font-family: 'Orbitron'; letter-spacing: 3px;">ECOBOT 2026</h1>
            <p id="boot-status" style="font-size: 9px; color: #666;">Configurando sensores de profundidade da lixeira...</p>
            <div id="loading-bar-wrap"><div id="loading-bar-fill"></div></div>
            <button id="launch-btn" class="btn-action hidden" onclick="startEngine()">EXECUTAR MISSÃO</button>
        </div>

        <div id="pause-overlay" class="hidden">
            <div class="blink-text" id="pause-msg">PRESSIONE QUALQUER TECLA</div>
        </div>

        <canvas id="coreCanvas"></canvas>
    </div>

    <div id="control-panel">
        <div class="bin-unit active" id="b-ewaste" onclick="updateMode('EWASTE')"><img src="3.png"><span>ELETRÔNICO</span></div>
        <div class="bin-unit" id="b-paper" onclick="updateMode('PAPER')"><img src="6.png"><span>PAPEL</span></div>
        <div class="bin-unit" id="b-organic" onclick="updateMode('ORGANIC')"><img src="1.png"><span>ORGÂNICO</span></div>
        <div class="bin-unit" id="b-metal" onclick="updateMode('METAL')"><img src="2.png"><span>METAIS</span></div>
        <div class="bin-unit" id="b-glass" onclick="updateMode('GLASS')"><img src="4.png"><span>VIDRO</span></div>
        <div class="bin-unit" id="b-plastic" onclick="updateMode('PLASTIC')"><img src="5.png"><span>PLÁSTICO</span></div>
    </div>
</div>

<script>
    const term = (m) => document.getElementById('console-terminal').innerText = `SYSTEM >> ${m}`;
    const canvas = document.getElementById('coreCanvas');
    const ctx = canvas.getContext('2d');
    
    let engineActive = false, gamePaused = true, score = 0, errors = 0, items = [], frameCount = 0;
    let gravityMultiplier = 0.08; 
    let lastSpawnTimestamp = 0, nextSpawnDelay = 3500; 

    const assets = {
        bot: '7.png', botL: '8.png', botR: '9.png',
        ew1: 'mouse.png', ew2: 'placa grafica.png', ew3: 'solda eletronica.png', ew4: 'teclado.png',
        pa1: 'caixa de papelao.png', pa2: 'jornal.png', pa3: 'livro papel.png',
        og1: 'frango.png', og2: 'pizza.png', og3: 'salada.png', og4: 'sorvete.png',
        mt1: 'aco metalico industrial.png', mt2: 'clip metalico.png', mt3: 'lata de refrigerante.png', mt4: 'panela de aluminio.png', mt5: 'parafuso metalico.png',
        gl1: 'garrafa de vidro quebrada.png',
        pl1: 'caneta plastica.png', pl2: 'garrafa pet.png', pl3: 'recipiente plastico.png'
    };

    const imageMap = {};

    async function loadAssets() {
        const keys = Object.keys(assets);
        const total = keys.length;
        let loaded = 0;
        try {
            await Promise.all(keys.map(key => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = assets[key];
                    img.onload = () => { loaded++; document.getElementById('loading-bar-fill').style.width = `${(loaded/total)*100}%`; resolve(); };
                    img.onerror = () => resolve();
                    imageMap[key] = img;
                });
            }));
            document.getElementById('launch-btn').classList.remove('hidden');
        } catch (e) { term("ERRO DE CARREGAMENTO."); }
    }

    const player = { currentCol: 2, targetX: 0, currentX: 0, y: 0, w: 85, h: 85, sprite: 'bot' };

    function syncResolution() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        player.y = canvas.height - 100;
        const colWidth = canvas.width / 6;
        player.currentX = (player.currentCol * colWidth) + (colWidth / 2) - (player.w / 2);
        player.targetX = player.currentX;
    }

    function startEngine() {
        const root = document.documentElement;
        if (root.requestFullscreen) root.requestFullscreen();
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('hud-display').classList.remove('hidden');
        document.getElementById('pause-overlay').classList.remove('hidden');
        if ('ontouchstart' in window) document.getElementById('pause-msg').innerText = "TOQUE PARA INICIAR";
        setTimeout(() => { syncResolution(); engineActive = true; runLoop(); }, 500);
        window.addEventListener('keydown', handlePCInput);
        canvas.addEventListener('touchstart', handleMobileInput, {passive: false});
    }

    function unpause() {
        gamePaused = false;
        lastSpawnTimestamp = Date.now();
        document.getElementById('pause-overlay').classList.add('hidden');
    }

    function handleMobileInput(e) {
        if (gamePaused) { unpause(); return; }
        e.preventDefault();
        const tx = e.touches[0].clientX;
        if (tx < window.innerWidth / 2) moveLeft(); else moveRight();
    }

    function handlePCInput(e) {
        if (gamePaused) { unpause(); return; }
        if (e.key === 'ArrowLeft') moveLeft();
        if (e.key === 'ArrowRight') moveRight();
    }

    function moveLeft() { if (player.currentCol > 0) { player.currentCol--; player.sprite = 'botL'; } }
    function moveRight() { if (player.currentCol < 5) { player.currentCol++; player.sprite = 'botR'; } }

    const WASTE_SCHEMA = {
        EWASTE:  { id: 0, color: '#ff8c00', btn: 'b-ewaste', pool: ['ew1','ew2','ew3','ew4'] },
        PAPER:   { id: 1, color: '#00bfff', btn: 'b-paper',  pool: ['pa1','pa2','pa3'] },
        ORGANIC: { id: 2, color: '#8b4513', btn: 'b-organic',pool: ['og1','og2','og3','og4'] },
        METAL:   { id: 3, color: '#ffd700', btn: 'b-metal',  pool: ['mt1','mt2','mt3','mt4', 'mt5'] },
        GLASS:   { id: 4, color: '#32cd32', btn: 'b-glass',  pool: ['gl1'] },
        PLASTIC: { id: 5, color: '#ff4500', btn: 'b-plastic',pool: ['pl1','pl2','pl3'] }
    };
    let currentMode = WASTE_SCHEMA.EWASTE;

    function updateMode(m) {
        document.querySelectorAll('.bin-unit').forEach(u => u.classList.remove('active'));
        currentMode = WASTE_SCHEMA[m];
        document.getElementById(currentMode.btn).classList.add('active');
        document.getElementById('mode-id').innerText = `MODO: ${m}`;
        document.getElementById('mode-id').style.color = currentMode.color;
    }

    class Trash {
        constructor(sprite, typeId) {
            this.w = 50; this.h = 50;
            const colWidth = canvas.width / 6;
            const targetCol = Math.floor(Math.random() * 6);
            this.x = (targetCol * colWidth) + (colWidth / 2) - (this.w / 2);
            this.y = -60;
            this.sprite = sprite;
            this.typeId = typeId;
            this.speed = (1.0 + Math.random() * 1.2) * gravityMultiplier * 8;
        }
        update() { this.y += this.speed; }
        draw() { if(imageMap[this.sprite].complete) ctx.drawImage(imageMap[this.sprite], this.x, this.y, this.w, this.h); }
    }

    function runLoop() {
        if (!engineActive) return;
        requestAnimationFrame(runLoop);
        
        const colWidth = canvas.width / 6;
        player.targetX = (player.currentCol * colWidth) + (colWidth / 2) - (player.w / 2);
        player.currentX += (player.targetX - player.currentX) * 0.12;
        if (Math.abs(player.targetX - player.currentX) < 2) player.sprite = 'bot';

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imageMap[player.sprite], player.currentX, player.y, player.w, player.h);

        if (gamePaused) return;

        const now = Date.now();
        if (now - lastSpawnTimestamp > nextSpawnDelay) {
            const types = Object.keys(WASTE_SCHEMA).filter(t => WASTE_SCHEMA[t].pool.length > 0);
            const typeKey = types[Math.floor(Math.random() * types.length)];
            const randomItem = WASTE_SCHEMA[typeKey].pool[Math.floor(Math.random() * WASTE_SCHEMA[typeKey].pool.length)];
            items.push(new Trash(randomItem, WASTE_SCHEMA[typeKey].id));
            lastSpawnTimestamp = now;
            nextSpawnDelay = 2200 + Math.random() * 4000;
        }

        for (let i = items.length - 1; i >= 0; i--) {
            items[i].update();
            
            // LÓGICA DE COLISÃO CENTRALIZADA (TRASH CENTER vs ROBOT CENTER)
            const trashCenterY = items[i].y + (items[i].h / 2);
            const robotCenterY = player.y + (player.h / 2);
            const trashCenterX = items[i].x + (items[i].w / 2);
            const robotCenterX = player.currentX + (player.w / 2);

            // Só coleta quando o CENTRO do lixo cruza o CENTRO do robô (onde está a lixeira)
            if (trashCenterY > robotCenterY - 10 && trashCenterY < robotCenterY + 30 &&
                Math.abs(trashCenterX - robotCenterX) < 30) {
                
                if (items[i].typeId === currentMode.id) score += 10; else errors++;
                items.splice(i, 1);
                updateStats();
                continue;
            } 
            
            if (items[i].y > canvas.height) {
                errors++; items.splice(i, 1); updateStats();
            } else {
                items[i].draw();
            }
        }
        frameCount++;
    }

    function updateStats() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('err-val').innerText = errors;
        if (errors >= 20) { engineActive = false; alert("Reciclagem Crítica! Tente novamente."); location.reload(); }
    }

    loadAssets();
</script>
</body>
</html>

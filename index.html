<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoBot OS v2.1 - ADS Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-blue: #00f3ff; --neon-red: #ff3131; --bg: #050505; }
        * { touch-action: manipulation; box-sizing: border-box; -webkit-user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        #console-terminal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 25px; 
            background: #111; border-bottom: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-size: 10px; font-family: monospace;
            padding: 5px 10px; z-index: 1000;
        }

        #main-shell { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        #game-canvas-area { flex-grow: 1; position: relative; background: radial-gradient(circle, #101020 0%, #000 100%); }
        canvas { display: block; width: 100%; height: 100%; }

        #control-panel { 
            display: flex; justify-content: space-around; background: #000; 
            padding: 8px 0; border-top: 1px solid var(--neon-blue); min-height: 80px;
        }
        .bin-unit { display: flex; flex-direction: column; align-items: center; opacity: 0.3; transition: 0.3s; flex: 1; cursor: pointer; }
        .bin-unit.active { opacity: 1; filter: drop-shadow(0 0 8px var(--neon-green)); transform: scale(1.1); }
        .bin-unit img { width: 42px; height: 42px; object-fit: contain; }
        .bin-unit span { font-size: 7px; font-family: 'Orbitron'; margin-top: 4px; color: #fff; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; text-align: center; }
        #hud-display { position: absolute; top: 35px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; font-family: 'Orbitron'; font-size: 10px; pointer-events: none; z-index: 100; }
        .hidden { display: none !important; }
        
        #loading-bar-wrap { width: 220px; height: 4px; background: #222; margin: 15px 0; border-radius: 2px; }
        #loading-bar-fill { width: 0%; height: 100%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); transition: width 0.3s; }
        
        .btn-action { padding: 12px 30px; background: none; border: 2px solid var(--neon-green); color: var(--neon-green); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="console-terminal">KERNEL: Sistema em espera...</div>

<div id="main-shell">
    <div id="game-canvas-area">
        <div id="hud-display" class="hidden">
            <div style="color: var(--neon-green);">DATA: <span id="score-val">0</span></div>
            <div id="mode-id" style="color: var(--neon-blue);">MODO: ELETRÔNICO</div>
            <div style="color: var(--neon-red);">LOST: <span id="err-val">0</span></div>
        </div>

        <div id="boot-screen" class="ui-layer">
            <h1 style="color: var(--neon-green); font-family: 'Orbitron'; letter-spacing: 3px;">ECOBOT 2026</h1>
            <p id="boot-status" style="font-size: 9px; color: #666;">Sincronizando pacotes de ativos...</p>
            <div id="loading-bar-wrap"><div id="loading-bar-fill"></div></div>
            <button id="launch-btn" class="btn-action hidden" onclick="startEngine()">EXECUTAR MISSÃO</button>
        </div>

        <canvas id="coreCanvas"></canvas>
    </div>

    <div id="control-panel">
        <div class="bin-unit active" id="b-ewaste" onclick="updateMode('EWASTE')"><img src="3.png"><span>ELETRÔNICO</span></div>
        <div class="bin-unit" id="b-paper" onclick="updateMode('PAPER')"><img src="6.png"><span>PAPEL</span></div>
        <div class="bin-unit" id="b-organic" onclick="updateMode('ORGANIC')"><img src="1.png"><span>ORGÂNICO</span></div>
        <div class="bin-unit" id="b-metal" onclick="updateMode('METAL')"><img src="2.png"><span>METAIS</span></div>
        <div class="bin-unit" id="b-glass" onclick="updateMode('GLASS')"><img src="4.png"><span>VIDRO</span></div>
        <div class="bin-unit" id="b-plastic" onclick="updateMode('PLASTIC')"><img src="5.png"><span>PLÁSTICO</span></div>
    </div>
</div>

<script>
    const term = (m) => document.getElementById('console-terminal').innerText = `SYSTEM >> ${m}`;
    const canvas = document.getElementById('coreCanvas');
    const ctx = canvas.getContext('2d');
    
    let engineActive = false, score = 0, errors = 0, items = [], frameCount = 0;
    let gravityMultiplier = 0.12; 
    let lastSpawnTimestamp = 0;
    let nextSpawnDelay = 3000; 
    let lastAccelTime = 0;
    let accelInterval = 50;

    // MAPEAMENTO CORRIGIDO: botL agora é 9 e botR é 8 (ou vice-versa conforme o comportamento relatado)
    const assets = {
        bot: '7.png',   // Frente
        botL: '8.png',  // LADO ESQUERDO (Ajustado)
        botR: '9.png',  // LADO DIREITO (Ajustado)
        ew1: 'placa-de-video.png', ew2: 'teclado.png',
        og1: 'pizza.png', og2: 'ceia-de-natal.png', og3: 'salada.png', og4: 'sorvete.png',
        mt1: 'lata-de-cerveja.png', mt2: 'parafuso.png',
        gl1: 'garrafa.png', pl1: 'agua.png'
    };

    const imageMap = {};

    async function loadAssets() {
        const keys = Object.keys(assets);
        const total = keys.length;
        let loaded = 0;

        try {
            await Promise.all(keys.map(key => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.src = assets[key];
                    img.onload = () => {
                        loaded++;
                        document.getElementById('loading-bar-fill').style.width = `${(loaded/total)*100}%`;
                        term(`Download: ${assets[key]} OK`);
                        resolve();
                    };
                    img.onerror = () => reject(`Erro em ${assets[key]}`);
                    imageMap[key] = img;
                });
            }));
            term("Sincronização Finalizada.");
            document.getElementById('boot-status').innerText = "Módulos de imagem carregados.";
            document.getElementById('launch-btn').classList.remove('hidden');
        } catch (e) {
            term("FALHA DE REDE NO CARREGAMENTO.");
        }
    }

    const player = { x: 0, y: 0, w: 70, h: 70, speed: 10, sprite: 'bot' };
    const inputs = { left: false, right: false };

    function syncResolution() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        player.y = canvas.height - 85;
        player.x = canvas.width / 2 - 35;
    }

    function startEngine() {
        const root = document.documentElement;
        if (root.requestFullscreen) root.requestFullscreen();
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('hud-display').classList.remove('hidden');
        setTimeout(() => {
            syncResolution();
            engineActive = true;
            lastSpawnTimestamp = Date.now();
            runLoop();
        }, 400);
    }

    const WASTE_SCHEMA = {
        EWASTE:  { id: 0, color: '#ff8c00', btn: 'b-ewaste', pool: ['ew1','ew2'] },
        PAPER:   { id: 1, color: '#00bfff', btn: 'b-paper',  pool: [] },
        ORGANIC: { id: 2, color: '#8b4513', btn: 'b-organic',pool: ['og1','og2','og3','og4'] },
        METAL:   { id: 3, color: '#ffd700', btn: 'b-metal',  pool: ['mt1','mt2'] },
        GLASS:   { id: 4, color: '#32cd32', btn: 'b-glass',  pool: ['gl1'] },
        PLASTIC: { id: 5, color: '#ff4500', btn: 'b-plastic',pool: ['pl1'] }
    };
    let currentMode = WASTE_SCHEMA.EWASTE;

    function updateMode(m) {
        document.querySelectorAll('.bin-unit').forEach(u => u.classList.remove('active'));
        currentMode = WASTE_SCHEMA[m];
        document.getElementById(currentMode.btn).classList.add('active');
        document.getElementById('mode-id').innerText = `MODO: ${m}`;
        document.getElementById('mode-id').style.color = currentMode.color;
    }

    // CONTROLE MOBILE E TECLADO
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') inputs.left = true;
        if (e.key === 'ArrowRight') inputs.right = true;
    });
    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft') inputs.left = false;
        if (e.key === 'ArrowRight') inputs.right = false;
    });

    canvas.addEventListener('touchstart', e => {
        const tx = e.touches[0].clientX;
        if (tx < window.innerWidth / 2) inputs.left = true;
        else inputs.right = true;
    }, {passive: false});
    canvas.addEventListener('touchend', () => { inputs.left = false; inputs.right = false; });

    function runLoop() {
        if (!engineActive) return;
        requestAnimationFrame(runLoop);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // LÓGICA DE MOVIMENTO CORRIGIDA (Sprites sincronizados com a direção)
        if (inputs.left && player.x > 0) { 
            player.x -= player.speed; 
            player.sprite = 'botL'; // 8.png agora olha para a esquerda
        } 
        else if (inputs.right && player.x < canvas.width - player.w) { 
            player.x += player.speed; 
            player.sprite = 'botR'; // 9.png agora olha para a direita
        } 
        else {
            player.sprite = 'bot'; // 7.png volta a olhar para frente
        }

        ctx.drawImage(imageMap[player.sprite], player.x, player.y, player.w, player.h);

        const now = Date.now();
        const seconds = Math.floor(frameCount / 60);

        // Aceleração conforme cronograma
        if (seconds > 0 && (seconds - lastAccelTime) >= accelInterval) {
            gravityMultiplier += 0.08;
            lastAccelTime = seconds;
            if (seconds >= 150 && seconds < 190) accelInterval = 40;
            else if (seconds >= 190 && seconds < 220) accelInterval = 30;
            else if (seconds >= 220) accelInterval = 20;
        }

        // Spawn aleatório 2s - 7s
        if (now - lastSpawnTimestamp > nextSpawnDelay) {
            const validTypes = Object.keys(WASTE_SCHEMA).filter(k => WASTE_SCHEMA[k].pool.length > 0);
            const typeKey = validTypes[Math.floor(Math.random() * validTypes.length)];
            const itemKey = WASTE_SCHEMA[typeKey].pool[Math.floor(Math.random() * WASTE_SCHEMA[typeKey].pool.length)];
            
            items.push({
                x: 30 + Math.random() * (canvas.width - 60),
                y: -50,
                sprite: itemKey,
                typeId: WASTE_SCHEMA[typeKey].id,
                speed: (1.2 + Math.random() * 1.5) * gravityMultiplier * 8
            });
            lastSpawnTimestamp = now;
            nextSpawnDelay = 2000 + Math.random() * 5000;
        }

        for (let i = items.length - 1; i >= 0; i--) {
            const it = items[i];
            it.y += it.speed;
            ctx.drawImage(imageMap[it.sprite], it.x, it.y, 45, 45);

            if (it.y + 40 > player.y && it.x + 40 > player.x && it.x < player.x + player.w

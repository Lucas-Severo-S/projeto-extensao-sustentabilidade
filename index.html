<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBot: Missão Sustentável 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 2px solid var(--neon-blue);
            background: rgba(10, 10, 25, 0.9);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        #game-area {
            position: relative;
            width: 800px;
            height: 500px; /* Reduzi um pouco a altura para caber o painel embaixo */
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* PAINEL INFERIOR */
        #bin-panel {
            width: 800px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 0;
            border-radius: 0 0 15px 15px;
            border-top: 1px solid var(--neon-blue);
        }

        .bin-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            filter: grayscale(0.5);
            opacity: 0.7;
        }

        .bin-btn img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .bin-btn span {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: white;
        }

        .bin-btn:hover {
            transform: translateY(-5px);
            filter: grayscale(0);
            opacity: 1;
        }

        .bin-btn.active {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.1);
        }

        .bin-btn.active img {
            filter: drop-shadow(0 0 10px var(--neon-green));
        }

        /* INTERFACE */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); margin: 0; }
        .hidden { display: none !important; }

        button {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        #hud {
            position: absolute;
            top: 10px; left: 10px; width: 780px;
            display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
            z-index: 10;
        }

        .stat { background: rgba(0, 0, 0, 0.5); padding: 5px 15px; border: 1px solid var(--neon-blue); }
    </style>
</head>
<body>

<div id="main-container">
    <div id="game-area">
        <div id="hud" class="hidden">
            <div class="stat">PONTOS: <span id="score-val">0</span></div>
            <div class="stat">MODO: <span id="mode-text" style="color: #ff8c00;">E-WASTE</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>ECOBOT 2026</h1>
            <p>Use as SETAS do teclado para mover.<br>CLIQUE nas lixeiras abaixo para mudar o modo.</p>
            <button onclick="startGame()">Iniciar Missão</button>
        </div>

        <div id="end-screen" class="overlay hidden">
            <h1>PARABÉNS!</h1>
            <p>Você é um mestre da reciclagem.</p>
            <button onclick="window.open('URL_DO_FORMULARIO')">Responder Pesquisa UNIVESP</button>
            <button onclick="location.reload()" style="font-size: 0.7rem; border-color: white; color: white;">Jogar Novamente</button>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div id="bin-panel">
        <div class="bin-btn active" id="btn-ewaste" onclick="setMode('EWASTE')">
            <img src="6.png"><span>E-WASTE</span>
        </div>
        <div class="bin-btn" id="btn-organic" onclick="setMode('ORGANIC')">
            <img src="1.png"><span>ORGÂNICO</span>
        </div>
        <div class="bin-btn" id="btn-metal" onclick="setMode('METAL')">
            <img src="2.png"><span>METAIS</span>
        </div>
        <div class="bin-btn" id="btn-glass" onclick="setMode('GLASS')">
            <img src="4.png"><span>VIDRO</span>
        </div>
        <div class="bin-btn" id="btn-plastic" onclick="setMode('PLASTIC')">
            <img src="5.png"><span>PLÁSTICO</span>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0;
    let gameActive = false;
    let items = [];
    let frame = 0;

    // Configuração de Imagens (Baseado no seu GitHub)
    const imageFiles = {
        botFront: '7.png', botRight: '8.png', botLeft: '9.png',
        ewaste1: 'placa-de-video.png', ewaste2: 'teclado.png',
        org1: 'pizza.png', org2: 'sorvete.png', org3: 'salada.png', org4: 'ceia-de-natal.png',
        metal1: 'lata-de-cerveja.png', metal2: 'clima.png', 
        glass1: 'garrafa.png', 
        plastic1: 'água.png'
    };

    const WASTE_TYPES = {
        EWASTE: { id: 0, name: 'E-WASTE', color: '#ff8c00', btnId: 'btn-ewaste' },
        ORGANIC: { id: 1, name: 'ORGÂNICO', color: '#8b4513', btnId: 'btn-organic' },
        METAL: { id: 2, name: 'METAIS', color: '#ffd700', btnId: 'btn-metal' },
        GLASS: { id: 3, name: 'VIDRO', color: '#32cd32', btnId: 'btn-glass' },
        PLASTIC: { id: 4, name: 'PLÁSTICO', color: '#ff4500', btnId: 'btn-plastic' }
    };

    let currentMode = WASTE_TYPES.EWASTE;
    const images = {};
    const keys = { left: false, right: false };

    // Carregar
    for (let key in imageFiles) {
        images[key] = new Image();
        images[key].src = imageFiles[key];
    }

    const player = {
        x: 350, y: 380, w: 100, h: 100, speed: 10,
        sprite: 'botFront'
    };

    // ESCUTA DE TECLAS CORRIGIDA
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') { keys.left = true; player.sprite = 'botLeft'; }
        if (e.key === 'ArrowRight') { keys.right = true; player.sprite = 'botRight'; }
    });

    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft') keys.left = false;
        if (e.key === 'ArrowRight') keys.right = false;
        if (!keys.left && !keys.right) player.sprite = 'botFront';
    });

    function setMode(modeKey) {
        document.querySelectorAll('.bin-btn').forEach(el => el.classList.remove('active'));
        currentMode = WASTE_TYPES[modeKey];
        document.getElementById(currentMode.btnId).classList.add('active');
        document.getElementById('mode-text').innerText = currentMode.name;
        document.getElementById('mode-text').style.color = currentMode.color;
    }

    class Trash {
        constructor() {
            this.x = Math.random() * (canvas.width - 50);
            this.y = -60;
            this.w = 50; this.h = 50;
            this.speed = 2 + Math.random() * 3;
            const keysArr = Object.keys(WASTE_TYPES);
            const typeKey = keysArr[Math.floor(Math.random() * keysArr.length)];
            this.type = WASTE_TYPES[typeKey];
            
            if (typeKey === 'EWASTE') this.img = images['ewaste' + (Math.random() > 0.5 ? '1' : '2')];
            else if (typeKey === 'ORGANIC') this.img = images['org' + (Math.floor(Math.random() * 4) + 1)];
            else if (typeKey === 'METAL') this.img = images['metal' + (Math.random() > 0.5 ? '1' : '2')];
            else if (typeKey === 'GLASS') this.img = images['glass1'];
            else this.img = images['plastic1'];
        }
        update() { this.y += this.speed; }
        draw() { if (this.img) ctx.drawImage(this.img, this.x, this.y, this.w, this.h); }
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        gameActive = true;
        loop();
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movimento Corrigido
        if (keys.left && player.x > 0) player.x -= player.speed;
        if (keys.right && player.x < canvas.width - player.w) player.x += player.speed;

        // Desenha Robô
        if (images[player.sprite]) ctx.drawImage(images[player.sprite], player.x, player.y, player.w, player.h);

        // Gerar itens
        frame++;
        if (frame % 80 === 0) items.push(new Trash());

        items.forEach((item, index) => {
            item.update();
            item.draw();

            // Colisão
            if (item.y + item.h > player.y + 20 && item.x + item.w > player.x && item.x < player.x + player.w) {
                if (item.type.id === currentMode.id) {
                    score += 10;
                } else {
                    score -= 5;
                }
                items.splice(index, 1);
                document.getElementById('score-val').innerText = score;
            }
            if (item.y > canvas.height) items.splice(index, 1);
        });

        if (score >= 300) {
            gameActive = false;
            document.getElementById('end-screen').classList.remove('hidden');
        }

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>

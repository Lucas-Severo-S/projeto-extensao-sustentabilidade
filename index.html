<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoBot: Fullscreen Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-blue: #00f3ff; --neon-red: #ff3131; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        
        #debug-log { 
            position: fixed; top: 0; left: 0; width: 100%; max-height: 60px; 
            background: rgba(255, 0, 0, 0.9); color: white; font-size: 9px; 
            z-index: 9999; overflow-y: auto; padding: 5px; font-family: monospace;
        }

        #main-container { display: flex; flex-direction: column; width: 100%; height: 100%; background: #000; }
        #game-area { flex-grow: 1; position: relative; background: radial-gradient(circle, #101025, #000); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #bin-panel { 
            display: flex; justify-content: space-around; background: #000; 
            padding: 8px 0; border-top: 1px solid var(--neon-blue); min-height: 70px;
        }
        .bin-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.4; flex: 1; }
        .bin-btn.active { opacity: 1; transform: scale(1.1); }
        .bin-btn img { width: 40px; height: 40px; object-fit: contain; }
        .bin-btn span { font-size: 7px; font-family: 'Orbitron'; margin-top: 2px; color: #fff; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #hud { position: absolute; top: 5px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; font-family: 'Orbitron'; font-size: 9px; pointer-events: none; z-index: 50; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="debug-log">Sistema: Aguardando Início...</div>

<div id="main-container">
    <div id="game-area">
        <div id="hud" class="hidden">
            <div style="border: 1px solid var(--neon-blue); padding: 3px;">PTS: <span id="score-val">0</span></div>
            <div id="mode-text" style="color: var(--neon-blue); font-weight: bold;">ELETRÔNICO</div>
            <div style="border: 1px solid var(--neon-red); color: var(--neon-red); padding: 3px;">ERR: <span id="error-val">0</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="color: var(--neon-green); font-family: 'Orbitron'; font-size: 1.5rem;">ECOBOT 2026</h1>
            <p style="font-size: 10px; margin-bottom: 20px;">Toque nas laterais para mover</p>
            <button onclick="requestStart()" style="padding: 12px 25px; background: var(--neon-green); border: none; color: #000; font-family: 'Orbitron'; font-weight: bold; border-radius: 5px;">JOGAR EM TELA CHEIA</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bin-panel">
        <div class="bin-btn active" id="btn-ewaste" onclick="setMode('EWASTE')"><img src="3.png"><span>E-WASTE</span></div>
        <div class="bin-btn" id="btn-paper" onclick="setMode('PAPER')"><img src="6.png"><span>PAPEL</span></div>
        <div class="bin-btn" id="btn-organic" onclick="setMode('ORGANIC')"><img src="1.png"><span>ORGÂNICO</span></div>
        <div class="bin-btn" id="btn-metal" onclick="setMode('METAL')"><img src="2.png"><span>METAIS</span></div>
        <div class="bin-btn" id="btn-glass" onclick="setMode('GLASS')"><img src="4.png"><span>VIDRO</span></div>
        <div class="bin-btn" id="btn-plastic" onclick="setMode('PLASTIC')"><img src="5.png"><span>PLÁSTICO</span></div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('debug-log');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Captura de erros para o debug na tela
    window.onerror = (msg, url, line) => {
        logDiv.innerHTML = `ERR: ${msg} na linha ${line}`;
        logDiv.style.background = "red";
    };

    let gameActive = false, score = 0, errors = 0, items = [], frame = 0;
    let globalSpeed = 0.15, lastSpawn = 0;
    const images = {}, keyState = {};

    const files = {
        bot: '7.png', botL: '9.png', botR: '8.png',
        ew1: 'placa-de-video.png', ew2: 'teclado.png',
        og1: 'pizza.png', mt1: 'lata-de-cerveja.png',
        mt2: 'parafuso.png', gl1: 'garrafa.png', pl1: 'agua.png'
    };

    for (let key in files) {
        images[key] = new Image();
        images[key].src = files[key];
        images[key].onerror = () => logDiv.innerHTML += `<br>Erro ao carregar: ${files[key]}`;
    }

    const player = { x: 0, y: 0, w: 60, h: 60, speed: 9, sprite: 'bot' };

    function resize() {
        // Usa as dimensões reais do elemento para evitar barras de endereço
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        player.y = canvas.height - 70;
        if (!gameActive) player.x = canvas.width / 2 - 30;
        logDiv.innerHTML = `Res: ${canvas.width}x${canvas.height} | Robô: ok`;
    }

    // Monitora quando a tela entra ou sai de fullscreen para ajustar o tamanho
    document.addEventListener('fullscreenchange', resize);
    document.addEventListener('webkitfullscreenchange', resize);

    function requestStart() {
        const container = document.getElementById('main-container');
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        // Pequeno atraso para o navegador esconder a barra antes de medir o tamanho
        setTimeout(() => {
            resize();
            gameActive = true;
            loop();
        }, 300);
    }

    function setMode(mode) {
        document.querySelectorAll('.bin-btn').forEach(b => b.classList.remove('active'));
        const modes = {
            'EWASTE': {id: 0, color: '#ff8c00', btn: 'btn-ewaste'},
            'PAPER': {id: 1, color: '#00bfff', btn: 'btn-paper'},
            'ORGANIC': {id: 2, color: '#8b4513', btn: 'btn-organic'},
            'METAL': {id: 3, color: '#ffd700', btn: 'btn-metal'},
            'GLASS': {id: 4, color: '#32cd32', btn: 'btn-glass'},
            'PLASTIC': {id: 5, color: '#ff4500', btn: 'btn-plastic'}
        };
        currentMode = modes[mode];
        document.getElementById(currentMode.btn).classList.add('active');
        document.getElementById('mode-text').innerText = mode;
        document.getElementById('mode-text').style.color = currentMode.color;
    }

    let currentMode = {id: 0};

    // Toque dividido no centro da tela
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const touchX = e.touches[0].clientX;
        if (touchX < window.innerWidth / 2) keyState['L'] = true;
        else keyState['R'] = true;
    }, {passive: false});

    canvas.addEventListener('touchend', () => { keyState['L'] = false; keyState['R'] = false; });

    function loop() {
        if (!gameActive) return;
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (keyState['L'] && player.x > 0) { player.x -= player.speed; player.sprite = 'botL'; }
        else if (keyState['R'] && player.x < canvas.width - player.w) { player.x += player.speed; player.sprite = 'botR'; }
        else player.sprite = 'bot';

        if (images[player.sprite].complete) {
            ctx.drawImage(images[player.sprite], player.x, player.y, player.w, player.h);
        }

        // Spawn a cada 3 segundos
        if (Date.now() - lastSpawn > 3000) {
            items.push({ 
                x: Math.random() * (canvas.width - 40), y: -40, 
                img: images.ew1, id: 0, speed: 2 
            });
            lastSpawn = Date.now();
        }

        for (let i = items.length - 1; i >= 0; i--) {
            items[i].y += items[i].speed;
            if (items[i].img.complete) ctx.drawImage(items[i].img, items[i].x, items[i].y, 40, 40);
            
            // Colisão simples
            if (items[i].y + 40 > player.y && items[i].x + 40 > player.x && items[i].x < player.x + player.w) {
                score += 10;
                items.splice(i, 1);
                document.getElementById('score-val').innerText = score;
                continue;
            }
            if (items[i].y > canvas.height) {
                errors++;
                items.splice(i, 1);
                document.getElementById('error-val').innerText = errors;
            }
        }
    }
</script>
</body>
</html>

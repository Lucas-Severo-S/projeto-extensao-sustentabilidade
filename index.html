<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoBot: Debug Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-blue: #00f3ff; --neon-red: #ff3131; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* CONSOLE VIRTUAL PARA VOCÊ VER NO CELULAR */
        #debug-log { 
            position: fixed; top: 0; left: 0; width: 100%; max-height: 80px; 
            background: rgba(255, 0, 0, 0.8); color: white; font-size: 10px; 
            z-index: 9999; overflow-y: auto; pointer-events: none; padding: 5px;
            font-family: monospace; display: block;
        }

        #main-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        #game-area { flex-grow: 1; position: relative; background: #050510; }
        canvas { display: block; width: 100%; height: 100%; }

        #bin-panel { 
            display: flex; justify-content: space-around; background: #000; 
            padding: 10px 0; border-top: 1px solid var(--neon-blue);
        }
        .bin-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.5; }
        .bin-btn.active { opacity: 1; transform: scale(1.1); }
        .bin-btn img { width: 45px; height: 45px; object-fit: contain; }
        .bin-btn span { font-size: 8px; font-family: 'Orbitron'; margin-top: 2px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-family: 'Orbitron'; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug-log">Log de Sistema: Iniciando...</div>

<div id="main-container">
    <div id="game-area">
        <div id="hud" class="hidden">
            <div>PTS: <span id="score-val">0</span></div>
            <div id="mode-text" style="color: var(--neon-blue);">ELETRÔNICO</div>
            <div style="color: var(--neon-red);">ERROS: <span id="error-val">0</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="color: var(--neon-green); font-family: 'Orbitron';">ECOBOT 2026</h1>
            <button onclick="requestStart()" style="padding: 15px 30px; background: none; border: 2px solid var(--neon-green); color: var(--neon-green); font-family: 'Orbitron';">INICIAR NO CELULAR</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bin-panel">
        <div class="bin-btn active" id="btn-ewaste" onclick="setMode('EWASTE')"><img src="3.png"><span>E-WASTE</span></div>
        <div class="bin-btn" id="btn-paper" onclick="setMode('PAPER')"><img src="6.png"><span>PAPEL</span></div>
        <div class="bin-btn" id="btn-organic" onclick="setMode('ORGANIC')"><img src="1.png"><span>ORGÂNICO</span></div>
        <div class="bin-btn" id="btn-metal" onclick="setMode('METAL')"><img src="2.png"><span>METAIS</span></div>
        <div class="bin-btn" id="btn-glass" onclick="setMode('GLASS')"><img src="4.png"><span>VIDRO</span></div>
        <div class="bin-btn" id="btn-plastic" onclick="setMode('PLASTIC')"><img src="5.png"><span>PLÁSTICO</span></div>
    </div>
</div>

<script>
    // REDIRECIONA ERROS PARA A TELA DO CELULAR
    const logDiv = document.getElementById('debug-log');
    window.onerror = function(msg, url, line) {
        logDiv.innerHTML += `<br> ERR: ${msg} (Linha: ${line})`;
        return false;
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameActive = false, score = 0, errors = 0, items = [], frame = 0;
    let globalSpeed = 0.15, lastSpawn = 0;

    const images = {};
    const files = {
        bot: '7.png', botL: '9.png', botR: '8.png',
        ew1: 'placa-de-video.png', ew2: 'teclado.png',
        og1: 'pizza.png', og2: 'ceia-de-natal.png',
        mt1: 'lata-de-cerveja.png', mt2: 'parafuso.png',
        gl1: 'garrafa.png', pl1: 'agua.png'
    };

    // Carregar imagens
    for (let key in files) {
        images[key] = new Image();
        images[key].src = files[key];
        images[key].onerror = () => logDiv.innerHTML += `<br> Falha: ${files[key]}`;
    }

    const player = { x: 50, y: 50, w: 60, h: 60, speed: 8, sprite: 'bot' };
    const keyState = {};

    function resize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        player.y = canvas.height - 70;
        player.x = canvas.width / 2 - 30;
    }

    function setMode(mode) {
        document.querySelectorAll('.bin-btn').forEach(b => b.classList.remove('active'));
        const modes = {
            'EWASTE': {id: 0, color: '#ff8c00', btn: 'btn-ewaste'},
            'PAPER': {id: 1, color: '#00bfff', btn: 'btn-paper'},
            'ORGANIC': {id: 2, color: '#8b4513', btn: 'btn-organic'},
            'METAL': {id: 3, color: '#ffd700', btn: 'btn-metal'},
            'GLASS': {id: 4, color: '#32cd32', btn: 'btn-glass'},
            'PLASTIC': {id: 5, color: '#ff4500', btn: 'btn-plastic'}
        };
        currentMode = modes[mode];
        document.getElementById(currentMode.btn).classList.add('active');
        document.getElementById('mode-text').innerText = mode;
        document.getElementById('mode-text').style.color = currentMode.color;
    }

    let currentMode = {id: 0};

    // Toque no celular
    canvas.addEventListener('touchstart', e => {
        const touchX = e.touches[0].clientX;
        if (touchX < window.innerWidth / 2) keyState['L'] = true;
        else keyState['R'] = true;
    });
    canvas.addEventListener('touchend', () => { keyState['L'] = false; keyState['R'] = false; });

    function requestStart() {
        const de = document.documentElement;
        if (de.requestFullscreen) de.requestFullscreen();
        else if (de.webkitRequestFullscreen) de.webkitRequestFullscreen();
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        resize();
        gameActive = true;
        loop();
    }

    function loop() {
        if (!gameActive) return;
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movimento
        if (keyState['L'] && player.x > 0) { player.x -= player.speed; player.sprite = 'botL'; }
        else if (keyState['R'] && player.x < canvas.width - player.w) { player.x += player.speed; player.sprite = 'botR'; }
        else player.sprite = 'bot';

        if (images[player.sprite].complete) {
            ctx.drawImage(images[player.sprite], player.x, player.y, player.w, player.h);
        }

        // Spawn Simples
        if (Date.now() - lastSpawn > 3000) {
            items.push({ 
                x: Math.random() * (canvas.width - 40), y: -40, 
                img: images.ew1, id: 0 
            });
            lastSpawn = Date.now();
        }

        items.forEach((item, i) => {
            item.y += 2;
            if (item.img.complete) ctx.drawImage(item.img, item.x, item.y, 40, 40);
            
            // Colisão
            if (item.y > player.y && item.x > player.x && item.x < player.x + player.w) {
                score += 10;
                items.splice(i, 1);
                document.getElementById('score-val').innerText = score;
            }
            if (item.y > canvas.height) items.splice(i, 1);
        });
    }
</script>
</body>
</html>

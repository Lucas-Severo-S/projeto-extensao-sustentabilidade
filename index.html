<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBot: Missão Sustentável 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-blue: #00f3ff; --neon-red: #ff3131; --dark-bg: #050505; }
        body { margin: 0; background-color: var(--dark-bg); color: white; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #main-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 15px; border: 2px solid var(--neon-blue); background: rgba(10, 10, 25, 0.95); border-radius: 20px; box-shadow: 0 0 40px rgba(0, 243, 255, 0.2); }
        #game-area { position: relative; width: 850px; height: 450px; background: linear-gradient(to bottom, #0f0c29, #24243e); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        canvas { display: block; }
        #bin-panel { width: 850px; display: flex; justify-content: center; gap: 15px; background: rgba(0, 0, 0, 0.8); padding: 15px 0; border-radius: 0 0 15px 15px; border-top: 2px solid var(--neon-blue); }
        .bin-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; filter: grayscale(0.9); opacity: 0.5; width: 100px; }
        .bin-btn img { width: 75px; height: 75px; object-fit: contain; margin-bottom: 5px; }
        .bin-btn span { font-family: 'Orbitron', sans-serif; font-size: 9px; color: white; font-weight: bold; }
        .bin-btn.active { filter: grayscale(0); opacity: 1; transform: scale(1.1); }
        .bin-btn.active img { filter: drop-shadow(0 0 15px var(--neon-green)); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); font-size: 2.8rem; }
        .hidden { display: none !important; }
        button { padding: 15px 45px; font-family: 'Orbitron', sans-serif; background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); cursor: pointer; margin-top: 25px; text-transform: uppercase; font-weight: bold; }
        button:disabled { border-color: #444; color: #444; }
        #hud { position: absolute; top: 10px; left: 10px; width: 830px; display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; pointer-events: none; z-index: 10; }
        .stat { background: rgba(0, 0, 0, 0.6); padding: 8px 20px; border: 1px solid var(--neon-blue); }
        .stat.err { border-color: var(--neon-red); color: var(--neon-red); }
    </style>
</head>
<body>

<div id="main-container">
    <div id="game-area">
        <div id="hud" class="hidden">
            <div class="stat">PONTOS: <span id="score-val">0</span></div>
            <div style="text-align: center;">
                <div class="stat" style="font-size: 0.8rem;">MODO: <span id="mode-text" style="color: #ff8c00;">ELETRÔNICO</span></div>
                <div id="time-text" style="font-size: 0.7rem; margin-top: 5px;">TEMPO: 0s</div>
            </div>
            <div class="stat err">ERROS: <span id="error-val">0</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>ECOBOT 2026</h1>
            <p id="loading-msg">Sincronizando banco de imagens...</p>
            <button id="start-btn" onclick="startGame()" disabled>Aguarde...</button>
        </div>

        <div id="end-screen" class="overlay hidden">
            <h1>MISSÃO FINALIZADA</h1>
            <p id="final-stats"></p>
            <button onclick="location.reload()">Recomeçar</button>
        </div>

        <canvas id="gameCanvas" width="850" height="450"></canvas>
    </div>

    <div id="bin-panel">
        <div class="bin-btn active" id="btn-ewaste" onclick="setMode('EWASTE')"><img src="3.png"><span>ELETRÔNICO</span></div>
        <div class="bin-btn" id="btn-paper" onclick="setMode('PAPER')"><img src="6.png"><span>PAPEL</span></div>
        <div class="bin-btn" id="btn-organic" onclick="setMode('ORGANIC')"><img src="1.png"><span>ORGÂNICO</span></div>
        <div class="bin-btn" id="btn-metal" onclick="setMode('METAL')"><img src="2.png"><span>METAIS</span></div>
        <div class="bin-btn" id="btn-glass" onclick="setMode('GLASS')"><img src="4.png"><span>VIDRO</span></div>
        <div class="bin-btn" id="btn-plastic" onclick="setMode('PLASTIC')"><img src="5.png"><span>PLÁSTICO</span></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0, errors = 0, gameActive = false, items = [], frame = 0; 
    let globalSpeedMultiplier = 0.10; 
    let lastSpawnX = 0, lastAccelTime = 0, currentAccelInterval = 50; 

    const imageFiles = {
        botFront: '7.png', botRight: '8.png', botLeft: '9.png',
        ewaste1: 'placa-de-video.png', ewaste2: 'teclado.png',
        org1: 'pizza.png', org2: 'ceia-de-natal.png', org3: 'salada.png', org4: 'sorvete.png',
        metal1: 'lata-de-cerveja.png', metal2: 'parafuso.png', 
        glass1: 'garrafa.png', plastic1: 'água.png'
    };

    const WASTE_TYPES = {
        EWASTE: { id: 0, name: 'ELETRÔNICO', color: '#ff8c00', btnId: 'btn-ewaste', items: ['ewaste1', 'ewaste2'] },
        PAPER: { id: 1, name: 'PAPEL', color: '#00bfff', btnId: 'btn-paper', items: [] },
        ORGANIC: { id: 2, name: 'ORGÂNICO', color: '#8b4513', btnId: 'btn-organic', items: ['org1', 'org2', 'org3', 'org4'] },
        METAL: { id: 3, name: 'METAIS', color: '#ffd700', btnId: 'btn-metal', items: ['metal1', 'metal2'] },
        GLASS: { id: 4, name: 'VIDRO', color: '#32cd32', btnId: 'btn-glass', items: ['glass1'] },
        PLASTIC: { id: 5, name: 'PLÁSTICO', color: '#ff4500', btnId: 'btn-plastic', items: ['plastic1'] }
    };

    let currentMode = WASTE_TYPES.EWASTE;
    const images = {}, keyState = {};

    // Carregamento de imagens
    let totalFiles = Object.keys(imageFiles).length;
    let loadedFiles = 0;

    for (let key in imageFiles) {
        images[key] = new Image();
        images[key].onload = images[key].onerror = () => {
            loadedFiles++;
            if(loadedFiles >= totalFiles) {
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.innerText = "Iniciar Missão";
                document.getElementById('loading-msg').innerText = "Imagens carregadas com sucesso!";
            }
        };
        images[key].src = imageFiles[key];
    }

    const player = { x: 375, y: 340, w: 100, h: 100, speed: 12, sprite: 'botFront' };

    window.addEventListener('keydown', e => { keyState[e.key] = true; });
    window.addEventListener('keyup', e => { keyState[e.key] = false; });

    function setMode(modeKey) {
        document.querySelectorAll('.bin-btn').forEach(el => el.classList.remove('active'));
        currentMode = WASTE_TYPES[modeKey];
        document.getElementById(currentMode.btnId).classList.add('active');
        document.getElementById('mode-text').innerText = currentMode.name;
        document.getElementById('mode-text').style.color = currentMode.color;
    }

    // Função para verificar se a imagem de um item está pronta
    function isImageReady(imgKey) {
        const img = images[imgKey];
        return img && img.complete && img.naturalWidth !== 0;
    }

    class Trash {
        constructor(imgKey, type) {
            let newX = Math.random() * (canvas.width - 60);
            if (Math.abs(newX - lastSpawnX) < 160) newX = (newX + 250) % (canvas.width - 60);
            this.x = newX; lastSpawnX = newX; this.y = -60; this.w = 55; this.h = 55;
            this.speed = (1.5 + Math.random() * 2) * globalSpeedMultiplier;
            this.imgKey = imgKey;
            this.type = type;
        }
        update() { this.y += this.speed; }
        draw() { ctx.drawImage(images[this.imgKey], this.x, this.y, this.w, this.h); }
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        gameActive = true; score = 0; errors = 0; frame = 0;
        globalSpeedMultiplier = 0.10; items = []; updateHUD(); loop();
    }

    function updateHUD() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('error-val').innerText = errors;
    }

    function loop() {
        if (!gameActive) return;
        requestAnimationFrame(loop);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Movimentação
        if (keyState['ArrowLeft'] && player.x > 0) { player.x -= player.speed; player.sprite = 'botLeft'; }
        else if (keyState['ArrowRight'] && player.x < canvas.width - player.w) { player.x += player.speed; player.sprite = 'botRight'; }
        else { player.sprite = 'botFront'; }
        
        if (isImageReady(player.sprite)) ctx.drawImage(images[player.sprite], player.x, player.y, player.w, player.h);

        frame++;
        const currentTime = Math.floor(frame / 60);
        document.getElementById('time-text').innerText = `TEMPO: ${currentTime}s`;
        globalSpeedMultiplier += 0.0001;

        // Tenta gerar lixo apenas a cada 90 frames
        if (frame % 90 === 0) {
            const types = Object.keys(WASTE_TYPES).filter(t => WASTE_TYPES[t].items.length > 0);
            const randomTypeKey = types[Math.floor(Math.random() * types.length)];
            const potentialItems = WASTE_TYPES[randomTypeKey].items;
            const randomItemKey = potentialItems[Math.floor(Math.random() * potentialItems.length)];

            // SÓ LANÇA SE A IMAGEM ESTIVER PRONTA
            if (isImageReady(randomItemKey)) {
                items.push(new Trash(randomItemKey, WASTE_TYPES[randomTypeKey]));
            }
        }

        for (let i = items.length - 1; i >= 0; i--) {
            items[i].update();
            items[i].draw();

            if (items[i].y + items[i].h > player.y + 20 && items[i].y < player.y + 80 &&
                items[i].x + items[i].w > player.x + 10 && items[i].x < player.x + player.w - 10) {
                if (items[i].type.id === currentMode.id) score += 10; else errors++;
                items.splice(i, 1); updateHUD(); continue;
            }
            if (items[i].y > canvas.height) { errors++; items.splice(i, 1); updateHUD(); }
        }

        if (errors >= 20) { gameActive = false; document.getElementById('end-screen').classList.remove('hidden'); }
    }
</script>
</body>
</html>

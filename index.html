<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBot: Missão Sustentável 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #main-wrapper {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid var(--neon-blue);
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #101020, #16213e);
            border: 2px solid rgba(0, 243, 255, 0.3);
            overflow: hidden;
        }

        /* Painel Lateral */
        #sidebar {
            width: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--neon-blue);
        }

        .bin-option {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
            padding: 5px;
            border-radius: 8px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.05);
        }

        .bin-option:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.1);
        }

        .bin-option.active {
            border-color: var(--neon-green);
            background: rgba(57, 255, 20, 0.2);
            box-shadow: 0 0 15px var(--neon-green);
        }

        canvas { display: block; }

        /* Telas */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); font-size: 2.5rem; margin: 0; }
        .hidden { display: none !important; }

        button {
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            cursor: pointer;
            margin-top: 20px;
        }

        #hud {
            position: absolute;
            top: 10px; left: 10px; width: 780px;
            display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
        }

        .stat-box { background: rgba(0, 243, 255, 0.1); padding: 8px 15px; border: 1px solid var(--neon-blue); }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="stat-box">PONTOS: <span id="score-val">0</span></div>
            <div class="stat-box">MODO: <span id="mode-text" style="color: #ff8c00;">E-WASTE</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>ECOBOT 2026</h1>
            <p>Selecione a lixeira correta no painel lateral <br>para coletar os resíduos que caem!</p>
            <button onclick="startGame()">Iniciar Missão</button>
        </div>

        <div id="end-screen" class="overlay hidden">
            <h1>MISSÃO CONCLUÍDA!</h1>
            <p>Sua contribuição ajudou a reduzir o impacto ambiental.</p>
            <button onclick="window.open('SEU_LINK_DO_FORMULARIO')">Responder Pesquisa da UNIVESP</button>
            <button onclick="location.reload()" style="font-size: 0.8rem; border-color: white; color: white;">Jogar Novamente</button>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div id="sidebar">
        <p style="font-size: 0.7rem; text-align: center; color: var(--neon-blue);">CLIQUE PARA TROCAR</p>
        <img src="6.png" class="bin-option active" id="bin-ewaste" onclick="setMode('EWASTE')" title="Eletrônicos">
        <img src="1.png" class="bin-option" id="bin-organic" onclick="setMode('ORGANIC')" title="Orgânico">
        <img src="2.png" class="bin-option" id="bin-metal" onclick="setMode('METAL')" title="Metais">
        <img src="4.png" class="bin-option" id="bin-glass" onclick="setMode('GLASS')" title="Vidro">
        <img src="5.png" class="bin-option" id="bin-plastic" onclick="setMode('PLASTIC')" title="Plástico">
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0;
    let gameActive = false;
    let items = [];
    let frame = 0;

    // Mapeamento de Arquivos
    const imageFiles = {
        botFront: '7.png', botRight: '8.png', botLeft: '9.png',
        ewaste1: 'placa-de-video.png', ewaste2: 'teclado.png',
        org1: 'pizza.png', org2: 'sorvete.png', org3: 'salada.png', org4: 'ceia-de-natal.png',
        metal1: 'lata-de-cerveja.png', metal2: 'clima.png', 
        glass1: 'garrafa.png', 
        plastic1: 'água.png'
    };

    const WASTE_TYPES = {
        EWASTE: { id: 0, name: 'E-WASTE', color: '#ff8c00', binId: 'bin-ewaste' },
        ORGANIC: { id: 1, name: 'ORGÂNICO', color: '#8b4513', binId: 'bin-organic' },
        METAL: { id: 2, name: 'METAIS', color: '#ffd700', binId: 'bin-metal' },
        GLASS: { id: 3, name: 'VIDRO', color: '#32cd32', binId: 'bin-glass' },
        PLASTIC: { id: 4, name: 'PLÁSTICO', color: '#ff4500', binId: 'bin-plastic' }
    };

    let currentMode = WASTE_TYPES.EWASTE;
    const images = {};

    // Pré-carregamento
    for (let key in imageFiles) {
        images[key] = new Image();
        images[key].src = imageFiles[key];
    }

    const player = {
        x: 350, y: 480, w: 100, h: 100, speed: 12,
        sprite: 'botFront', moveLeft: false, moveRight: false
    };

    function setMode(modeKey) {
        // Remove 'active' de todas
        document.querySelectorAll('.bin-option').forEach(el => el.classList.remove('active'));
        
        currentMode = WASTE_TYPES[modeKey];
        document.getElementById(currentMode.binId).classList.add('active');
        document.getElementById('mode-text').innerText = currentMode.name;
        document.getElementById('mode-text').style.color = currentMode.color;
    }

    class Trash {
        constructor() {
            this.x = Math.random() * (canvas.width - 60);
            this.y = -60;
            this.w = 55; this.h = 55;
            this.speed = 3 + Math.random() * 4;
            
            const keys = Object.keys(WASTE_TYPES);
            const typeKey = keys[Math.floor(Math.random() * keys.length)];
            this.type = WASTE_TYPES[typeKey];
            
            if (typeKey === 'EWASTE') this.img = images['ewaste' + (Math.random() > 0.5 ? '1' : '2')];
            else if (typeKey === 'ORGANIC') this.img = images['org' + (Math.floor(Math.random() * 4) + 1)];
            else if (typeKey === 'METAL') this.img = images['metal' + (Math.random() > 0.5 ? '1' : '2')];
            else if (typeKey === 'GLASS') this.img = images['glass1'];
            else this.img = images['plastic1'];
        }
        update() { this.y += this.speed; }
        draw() { if (this.img) ctx.drawImage(this.img, this.x, this.y, this.w, this.h); }
    }

    // Teclado
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') { player.moveLeft = true; player.sprite = 'botLeft'; }
        if (e.key === 'ArrowRight') { player.moveRight = true; player.sprite = 'botRight'; }
    });
    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            player.moveLeft = false; player.moveRight = false; player.sprite = 'botFront';
        }
    });

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        gameActive = true;
        loop();
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movimento
        if (player.moveLeft && player.x > 0) player.x -= player.speed;
        if (player.moveRight && player.x < canvas.width - player.w) player.x += player.speed;

        // Desenha Robô
        if (images[player.sprite]) ctx.drawImage(images[player.sprite], player.x, player.y, player.w, player.h);

        // Gerar itens
        frame++;
        if (frame % 70 === 0) items.push(new Trash());

        items.forEach((item, index) => {
            item.update();
            item.draw();

            // Colisão
            if (item.y + item.h > player.y + 20 && item.x + item.w > player.x && item.x < player.x + player.w) {
                if (item.type.id === currentMode.id) {
                    score += 10;
                } else {
                    score -= 5;
                }
                items.splice(index, 1);
                document.getElementById('score-val').innerText = score;
            }
            if (item.y > canvas.height) items.splice(index, 1);
        });

        if (score >= 300) {
            gameActive = false;
            document.getElementById('end-screen').classList.remove('hidden');
        }

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
